<script>
const translations = {

  },
  fr: {
    title: "Photos",
    heroText: "écrivaine traductrice voyageuse",
    menuHome: "accueil",
    menuContact: "contact",
    menuBio: "biographie",
    menuBooks: "œuvres",
    menuNews: "actualités",
    menuInterviews: "entretiens",
    menuAwards: "prix",
    menuPhotos: "photos",
    footerContact: "Contact",
    footerTranslation: "Soutien en traduction",
    footerBooks: "Œuvres",
    footerPhotos: "Photos",
    footerInterviews: "Entretiens",
    footerAwards: "Prix",
    footerNews: "Actualités"
  },
  ar: {
    title: "الصور",
    heroText: "كاتبة مترجمة رحّالة",
    menuHome: "الرئيسية",
    menuContact: "اتصال",
    menuBio: "السيرة الذاتية",
    menuBooks: "الأعمال",
    menuNews: "الأخبار",
    menuInterviews: "المقابلات",
    menuAwards: "الجوائز",
    menuPhotos: "الصور",
    footerContact: "اتصال",
    footerTranslation: "دعم الترجمة",
    footerBooks: "الأعمال",
    footerPhotos: "الصور",
    footerInterviews: "المقابلات",
    footerAwards: "الجوائز",
    footerNews: "الأخبار"
  }
};

function changeLang(lang, el) {
  document.querySelectorAll(".lang-tab").forEach(tab => {
    tab.classList.remove("active");
  });

  if (el) el.classList.add("active");

  localStorage.setItem("siteLang", lang);

  document.getElementById("title").innerText = translations[lang].title;
  document.getElementById("hero-text").innerText = translations[lang].heroText;
  document.getElementById("menu-home").innerText = translations[lang].menuHome;
  document.getElementById("menu-contact").innerText = translations[lang].menuContact;
  document.getElementById("menu-bio").innerText = translations[lang].menuBio;
  document.getElementById("menu-books").innerText = translations[lang].menuBooks;
  document.getElementById("menu-news").innerText = translations[lang].menuNews;
  document.getElementById("menu-interviews").innerText = translations[lang].menuInterviews;
  document.getElementById("menu-awards").innerText = translations[lang].menuAwards;
  document.getElementById("menu-photos").innerText = translations[lang].menuPhotos;

  document.getElementById("footer-contact").innerText = translations[lang].footerContact;
  document.getElementById("footer-translation").innerText = translations[lang].footerTranslation;
  document.getElementById("footer-books").innerText = translations[lang].footerBooks;
  document.getElementById("footer-photos").innerText = translations[lang].footerPhotos;
  document.getElementById("footer-interviews").innerText = translations[lang].footerInterviews;
  document.getElementById("footer-awards").innerText = translations[lang].footerAwards;
  document.getElementById("footer-news").innerText = translations[lang].footerNews;

  document.documentElement.lang = lang;
if (lang === "ar") {
  document.documentElement.lang = "ar";

  document.getElementById("title").style.direction = "rtl";
  document.getElementById("title").style.textAlign = "right";
  document.getElementById("hero-text").style.direction = "rtl";
  document.getElementById("hero-text").style.textAlign = "right";

  document.querySelector(".hero-right").style.direction = "rtl";
  document.querySelector(".hero-right").style.textAlign = "right";
  document.querySelector(".menu-buttons").style.direction = "rtl";
  document.querySelector(".menu-buttons").style.textAlign = "right";

} else {
  document.documentElement.lang = lang;

  document.getElementById("title").style.direction = "ltr";
  document.getElementById("title").style.textAlign = "left";
  document.getElementById("hero-text").style.direction = "ltr";
  document.getElementById("hero-text").style.textAlign = "left";

  document.querySelector(".hero-right").style.direction = "ltr";
  document.querySelector(".hero-right").style.textAlign = "left";
  document.querySelector(".menu-buttons").style.direction = "ltr";
  document.querySelector(".menu-buttons").style.textAlign = "left";
}
}

window.addEventListener("DOMContentLoaded", () => {
  const savedLang = localStorage.getItem("siteLang") || "tr";

  document.querySelectorAll(".lang-tab").forEach(tab => {
    const onclickText = tab.getAttribute("onclick") || "";
    if (onclickText.includes(`changeLang('${savedLang}'`)) {
      changeLang(savedLang, tab);
    }
  });
});
</script>
